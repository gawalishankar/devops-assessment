services:
  postgres:
    image: postgres:16
    container_name: devops-assessment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hotel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
